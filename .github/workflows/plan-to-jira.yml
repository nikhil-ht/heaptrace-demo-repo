name: "Post Copilot Plan to Jira"

on:
  push:
    branches:
      - 'copilot/**'

jobs:
  post-plan-to-jira:
    runs-on: ubuntu-latest
    environment: JIRA_API_TOKEN
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Find open PR for this branch
        id: findpr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });
            if (prs.length === 0) {
              core.setOutput('found', 'false');
              return;
            }
            const pr = prs[0];
            core.setOutput('found', 'true');
            core.setOutput('number', pr.number);
            core.setOutput('title', pr.title);
            core.setOutput('body', pr.body || '');
            core.setOutput('url', pr.html_url);

      - name: Find and read plan.md
        id: plan
        run: |
          # Search for plan.md in common locations
          PLAN_FILE=""
          for f in plan.md memories/session/plan.md .copilot/plan.md; do
            if [ -f "$f" ]; then
              PLAN_FILE="$f"
              break
            fi
          done

          if [ -z "$PLAN_FILE" ]; then
            echo "No plan.md found. Checking PR body instead."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found plan at: $PLAN_FILE"
          echo "found=true" >> $GITHUB_OUTPUT

          # Read plan content (truncate to 30000 chars for Jira limit)
          CONTENT=$(head -c 30000 "$PLAN_FILE")
          # Save to file for next step
          echo "$CONTENT" > /tmp/plan_content.txt

      - name: Extract Jira key from PR title or branch
        id: jira
        if: steps.findpr.outputs.found == 'true'
        env:
          PR_TITLE: ${{ steps.findpr.outputs.title }}
        run: |
          JIRA_KEY=$(echo "$PR_TITLE" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          if [ -z "$JIRA_KEY" ]; then
            JIRA_KEY=$(echo "$GITHUB_REF_NAME" | grep -oiE '[A-Z]+-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')
          fi
          echo "key=$JIRA_KEY" >> $GITHUB_OUTPUT
          echo "Jira key: $JIRA_KEY"

      - name: Post plan to Jira comment
        if: steps.jira.outputs.key != '' && steps.plan.outputs.found == 'true'
        env:
          PR_URL: ${{ steps.findpr.outputs.url }}
        run: |
          PLAN=$(python3 <<'PY'
          import json, os, re

          with open('/tmp/plan_content.txt') as f:
              md = f.read()

          # ── Markdown → Jira wiki markup ─────────────────────────────────
          # 1) Fenced code blocks (```lang ... ```) → {code:lang} ... {code}
          #    Handle BEFORE other transforms so inner text isn't mangled.
          def code_block(m):
              lang = (m.group(1) or '').strip()
              body = m.group(2)
              return f"{{code:{lang}}}\n{body}{{code}}" if lang else f"{{code}}\n{body}{{code}}"
          md = re.sub(r"```(\w*)\n(.*?)```", code_block, md, flags=re.DOTALL)

          # 2) Inline code `foo` → {{foo}}
          md = re.sub(r"`([^`\n]+)`", r"{{\1}}", md)

          # 3) Headings: ## Title → h2. Title (up to h6)
          for n in range(6, 0, -1):
              md = re.sub(rf"^{'#'*n} (.+)$", rf"h{n}. \1", md, flags=re.MULTILINE)

          # 4) Bold **x** → *x*, Italic _x_ stays, strikethrough ~~x~~ → -x-
          md = re.sub(r"\*\*([^*\n]+)\*\*", r"*\1*", md)
          md = re.sub(r"~~([^~\n]+)~~", r"-\1-", md)

          # 5) Links [text](url) → [text|url]
          md = re.sub(r"\[([^\]]+)\]\(([^)]+)\)", r"[\1|\2]", md)

          # 6) Task list: - [ ] / - [x] → (x) / (/)
          md = re.sub(r"^(\s*)- \[ \] ", r"\1(x) ", md, flags=re.MULTILINE)
          md = re.sub(r"^(\s*)- \[x\] ", r"\1(/) ", md, flags=re.MULTILINE)

          # 7) Bullet list: - item / * item → * item (Jira uses *)
          md = re.sub(r"^(\s*)[-*] ", r"\1* ", md, flags=re.MULTILINE)

          # 8) Markdown tables → Jira tables (||header|| and |cell|)
          lines = md.split('\n')
          out = []
          i = 0
          while i < len(lines):
              line = lines[i]
              # detect header row + separator row
              if (re.match(r"^\|.+\|$", line) and i + 1 < len(lines)
                      and re.match(r"^\|\s*:?-+:?\s*(\|\s*:?-+:?\s*)+\|$", lines[i + 1])):
                  header_cells = [c.strip() for c in line.strip('|').split('|')]
                  out.append('||' + '||'.join(header_cells) + '||')
                  i += 2
                  while i < len(lines) and re.match(r"^\|.+\|$", lines[i]):
                      cells = [c.strip() for c in lines[i].strip('|').split('|')]
                      out.append('|' + '|'.join(cells) + '|')
                      i += 1
                  continue
              out.append(line)
              i += 1
          md = '\n'.join(out)

          # 9) Horizontal rule --- → ----
          md = re.sub(r"^---+$", "----", md, flags=re.MULTILINE)

          # ── Wrap with header + approval footer ───────────────────────────
          msg  = 'h2. 🤖 Copilot Agent — Feature Plan\n\n'
          msg += md
          msg += '\n\n----\n'
          msg += '{panel:title=Next step|bgColor=#E3FCEF}\n'
          msg += '(/) Reply *APPROVED* to proceed with implementation\n'
          msg += '(!) Reply *CHANGE: [your feedback]* to revise the plan\n'
          msg += '(x) Reply *STOP* to cancel\n'
          msg += '{panel}\n'
          msg += '\n_PR: [' + os.environ['PR_URL'] + '|' + os.environ['PR_URL'] + ']_'

          print(json.dumps(msg))
          PY
          )

          curl -s -X POST \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $PLAN}" \
            "https://${{ secrets.JIRA_DOMAIN }}.atlassian.net/rest/api/2/issue/${{ steps.jira.outputs.key }}/comment"

          echo "✅ Plan posted to Jira: ${{ steps.jira.outputs.key }}"

      - name: Post PR body to Jira (fallback if no plan.md)
        if: steps.jira.outputs.key != '' && steps.plan.outputs.found != 'true'
        env:
          PR_BODY: ${{ steps.findpr.outputs.body }}
          PR_URL: ${{ steps.findpr.outputs.url }}
        run: |
          BODY=$(python3 -c "
          import json, os
          body = os.environ.get('PR_BODY', '')
          msg = '🤖 *Copilot Agent — PR Created*\n\n'
          msg += body[:5000] if body else 'No description provided.'
          msg += '\n\n---\n'
          msg += '✅ Reply *APPROVED* to proceed\n'
          msg += '✏️ Reply *CHANGE: [feedback]* to revise\n'
          msg += '🛑 Reply *STOP* to cancel\n'
          msg += '\n_PR: ' + os.environ['PR_URL'] + '_'
          print(json.dumps(msg))
          ")

          curl -s -X POST \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $BODY}" \
            "https://${{ secrets.JIRA_DOMAIN }}.atlassian.net/rest/api/2/issue/${{ steps.jira.outputs.key }}/comment"